<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Checklist - 우영's 루틴</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0a0e27 0%,#1a1f3a 50%,#0d1225 100%);color:#e0e0e0;min-height:100vh;padding:20px;padding-bottom:100px}
.header{text-align:center;padding:20px 0;margin-bottom:20px}
.header h1{font-size:1.4rem;color:#fff;margin-bottom:5px}
.header .date{font-size:.95rem;color:#8892b0}
.header .sync-status{font-size:.8rem;margin-top:8px;padding:4px 12px;border-radius:12px;display:inline-block}
.sync-status.connected{background:rgba(72,187,120,.15);color:#48bb78;border:1px solid rgba(72,187,120,.3)}
.sync-status.disconnected{background:rgba(245,101,101,.15);color:#f56565;border:1px solid rgba(245,101,101,.3)}
.sync-status.loading{background:rgba(237,187,45,.15);color:#edbb2d;border:1px solid rgba(237,187,45,.3)}
.auth-section{text-align:center;margin-bottom:20px}
.auth-btn{background:linear-gradient(135deg,#4285f4,#356ac3);color:#fff;border:none;padding:12px 28px;border-radius:25px;font-size:.95rem;cursor:pointer;transition:all .3s;box-shadow:0 4px 15px rgba(66,133,244,.3)}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(66,133,244,.4)}
.auth-btn.signout{background:linear-gradient(135deg,#555,#444);box-shadow:0 4px 15px rgba(0,0,0,.2);font-size:.8rem;padding:8px 20px}
.progress-section{margin-bottom:25px}
.progress-bar-container{background:rgba(255,255,255,.05);border-radius:10px;height:8px;overflow:hidden;margin-top:8px}
.progress-bar{height:100%;background:linear-gradient(90deg,#48bb78,#38a169);border-radius:10px;transition:width .5s ease}
.progress-text{font-size:.85rem;color:#8892b0;display:flex;justify-content:space-between}
.quote-section{text-align:center;margin-bottom:25px;padding:15px;background:rgba(72,187,120,.08);border-radius:12px;border:1px solid rgba(72,187,120,.15)}
.quote-section p{font-size:.9rem;color:#a8b2d1;font-style:italic}
.quote-label{font-size:.75rem;color:#5a6a8a;margin-bottom:5px}
.event-card{background:rgba(255,255,255,.04);border-radius:14px;padding:16px;margin-bottom:12px;border-left:4px solid #666;transition:all .3s;position:relative;cursor:pointer}
.event-card:hover{background:rgba(255,255,255,.07);transform:translateX(3px)}
.event-card.checked{opacity:.5}
.event-card.checked .event-title{text-decoration:line-through}
.event-card .event-time{font-size:.85rem;font-weight:600;margin-bottom:4px}
.event-card .event-title{font-size:1.05rem;font-weight:500;color:#fff}
.event-card .event-desc{font-size:.8rem;color:#6a7a9a;margin-top:4px}
.event-card .checkbox{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:24px;height:24px;border:2px solid #444;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.event-card.checked .checkbox{background:#48bb78;border-color:#48bb78}
.event-card.checked .checkbox::after{content:'\2713';color:#fff;font-size:14px}
.event-card.color-tomato{border-left-color:#e57373}.event-card.color-tomato .event-time{color:#e57373}
.event-card.color-flamingo{border-left-color:#f48fb1}.event-card.color-flamingo .event-time{color:#f48fb1}
.event-card.color-tangerine{border-left-color:#ffb74d}.event-card.color-tangerine .event-time{color:#ffb74d}
.event-card.color-banana{border-left-color:#fff176}.event-card.color-banana .event-time{color:#fff176}
.event-card.color-sage{border-left-color:#a5d6a7}.event-card.color-sage .event-time{color:#a5d6a7}
.event-card.color-basil{border-left-color:#66bb6a}.event-card.color-basil .event-time{color:#66bb6a}
.event-card.color-peacock{border-left-color:#4fc3f7}.event-card.color-peacock .event-time{color:#4fc3f7}
.event-card.color-blueberry{border-left-color:#7986cb}.event-card.color-blueberry .event-time{color:#7986cb}
.event-card.color-lavender{border-left-color:#b39ddb}.event-card.color-lavender .event-time{color:#b39ddb}
.event-card.color-grape{border-left-color:#ce93d8}.event-card.color-grape .event-time{color:#ce93d8}
.event-card.color-graphite{border-left-color:#90a4ae}.event-card.color-graphite .event-time{color:#90a4ae}
.event-card.color-default{border-left-color:#4fc3f7}.event-card.color-default .event-time{color:#4fc3f7}
.add-event-btn{position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#4285f4,#356ac3);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(66,133,244,.4);transition:all .3s;z-index:100;display:none;align-items:center;justify-content:center}
.add-event-btn:hover{transform:scale(1.1)}
.add-event-btn.visible{display:flex}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#1e2340;border-radius:20px 20px 0 0;padding:25px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto}
.modal h3{margin-bottom:20px;color:#fff;font-size:1.1rem}
.modal label{display:block;font-size:.85rem;color:#8892b0;margin-bottom:5px;margin-top:12px}
.modal input,.modal select{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #333;background:rgba(255,255,255,.05);color:#fff;font-size:.95rem}
.modal input:focus,.modal select:focus{outline:none;border-color:#4285f4}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions button{flex:1;padding:12px;border-radius:12px;border:none;font-size:.95rem;cursor:pointer;transition:all .3s}
.modal-actions .cancel-btn{background:rgba(255,255,255,.1);color:#aaa}
.modal-actions .save-btn{background:linear-gradient(135deg,#4285f4,#356ac3);color:#fff}
.gcal-link{display:block;text-align:center;margin-top:25px;padding:14px;background:linear-gradient(135deg,rgba(66,133,244,.15),rgba(53,106,195,.15));border:1px solid rgba(66,133,244,.3);border-radius:14px;color:#4285f4;text-decoration:none;font-size:.95rem;transition:all .3s}
.gcal-link:hover{background:linear-gradient(135deg,rgba(66,133,244,.25),rgba(53,106,195,.25))}
.refresh-btn{background:none;border:1px solid rgba(255,255,255,.1);color:#8892b0;padding:6px 14px;border-radius:20px;font-size:.8rem;cursor:pointer;transition:all .3s}
.refresh-btn:hover{border-color:rgba(255,255,255,.3);color:#fff}
.empty-state{text-align:center;padding:40px 20px;color:#5a6a8a}
.empty-state .icon{font-size:48px;margin-bottom:15px}
.spinner{width:24px;height:24px;border:3px solid rgba(255,255,255,.1);border-top-color:#4285f4;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.now-indicator{display:flex;align-items:center;gap:10px;margin:8px 0;color:#f56565;font-size:.8rem}
.now-indicator::before{content:'';display:block;width:8px;height:8px;background:#f56565;border-radius:50%}
.now-indicator::after{content:'';flex:1;height:1px;background:rgba(245,101,101,.4)}
</style>
</head>
<body>
<div class="header">
<h1>Daily Checklist</h1>
<div class="date" id="todayDate"></div>
<div class="sync-status disconnected" id="syncStatus" style="display:none">Google 캘린더 연결 안됨</div>
</div>
<div class="auth-section" id="authSection" style="display:none">
<button class="auth-btn" id="authBtn" onclick="handleAuth()">Google 캘린더 연결하기</button>
</div>
<div class="progress-section" id="progressSection">
<div class="progress-text"><span id="progressLabel">오늘의 진행률</span><span id="progressPercent">0%</span></div>
<div class="progress-bar-container"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
</div>
<div id="eventsContainer">
<div class="spinner"></div>
</div>
<a class="gcal-link" href="https://calendar.google.com" target="_blank">📅 Google 캘린더에서 열기 →</a>
<div class="quote-section"><div class="quote-label">오늘의 한마디</div><p id="dailyQuote">"연습은 결코 배신하지 않는다."</p></div>
<button class="add-event-btn visible" id="addEventBtn" onclick="showAddModal()">+</button>
<div class="modal-overlay" id="modalOverlay">
<div class="modal">
<h3>새 일정 추가</h3>
<label>일정 이름</label><input type="text" id="newEventTitle" placeholder="예: 기타 연습">
<label>시작 시간</label><input type="time" id="newEventStart" value="09:00">
<label>종료 시간</label><input type="time" id="newEventEnd" value="10:00">
<label>설명 (선택)</label><input type="text" id="newEventDesc" placeholder="메모">
<div class="modal-actions">
<button class="cancel-btn" onclick="hideAddModal()">취소</button>
<button class="save-btn" onclick="createEvent()">Google 캘린더에 추가</button>
</div></div></div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js"></script>
<script>
const API_KEY='AIzaSyAQmYRbk2JZfqphaB6Zx1UXlcyjWkr-ugY';
const CLIENT_ID='192215919522-n6146kgbueauq9ok0i2dcl5v8d1rlh77.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/calendar';
const DISCOVERY_DOC='https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
let tokenClient,gapiInited=false,gisInited=false,isAuthed=false;
const quotes=["연습은 결코 배신하지 않는다.","오늘 하루도 최선을 다하자.","작은 진전도 진전이다.","꾸준함이 천재를 이긴다.","시작이 반이다.","할 수 있다고 믿으면 반은 이룬 것이다.","노력은 배신하지 않는다.","오늘의 나는 어제의 나보다 낫다.","멈추지 않는 한, 얼마나 천천��� 가는지는 중요핔지 않다.","목표를 향해 한 걸음씩."];
const colorMap={'1':'lavender','2':'sage','3':'grape','4':'flamingo','5':'banana','6':'tangerine','7':'peacock','8':'graphite','9':'blueberry','10':'basil','11':'tomato'};

document.addEventListener('DOMContentLoaded',()=>{setTodayDate();setRandomQuote();loadCheckState()});

function setTodayDate(){const n=new Date(),d=['일','월','화','수','목','금','토'];document.getElementById('todayDate').textContent=n.getFullYear()+'년 '+(n.getMonth()+1)+'월 '+n.getDate()+'일 ('+d[n.getDay()]+')'}
function setRandomQuote(){const t=new Date(),i=(t.getFullYear()*366+t.getMonth()*31+t.getDate())%quotes.length;document.getElementById('dailyQuote').textContent='"'+quotes[i]+'"'}

function gapiLoaded(){gapi.load('client',initGapiClient)}
async function initGapiClient(){try{await gapi.client.init({apiKey:API_KEY,discoveryDocs:[DISCOVERY_DOC]});gapiInited=true;maybeEnableAuth()}catch(e){console.error('GAPI init error:',e)}}
function gisLoaded(){tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:handleTokenResponse});gisInited=true;maybeEnableAuth()}
function maybeEnableAuth(){if(gapiInited&&gisInited){const s=localStorage.getItem('gcal_token');if(s){try{gapi.client.setToken(JSON.parse(s));isAuthed=true;onAuthed()}catch(e){localStorage.removeItem('gcal_token');document.getElementById('authSection').style.display='block';document.getElementById('eventsContainer').innerHTML='<div class="empty-state"><div class="icon">🔗</div><p>캘린더 연결이 필요합니다.<br>위 버튼을 눌러 연결해주세요.</p></div>'}}else{document.getElementById('authSection').style.display='block';document.getElementById('eventsContainer').innerHTML='<div class="empty-state"><div class="icon">📋</div><p>Google 캘린더에 연결하면<br>오늘의 일정을 체크리스트로 볼 수 있어요.</p></div>'}}}

function handleAuth(){if(!gisInited){alert('Google API가 아직 로드되지 않았습니다. 잠시 후 다시 시도해주세요.');return}if(isAuthed){const t=gapi.client.getToken();if(t)google.accounts.oauth2.revoke(t.access_token);gapi.client.setToken('');localStorage.removeItem('gcal_token');isAuthed=false;document.getElementById('authBtn').textContent='Google 캘린더 연결하기';document.getElementById('authBtn').classList.remove('signout');document.getElementById('syncStatus').className='sync-status disconnected';document.getElementById('syncStatus').textContent='Google 캘린더 연결 안됨';document.getElementById('progressSection').style.display='none';document.getElementById('addEventBtn').classList.remove('visible');document.getElementById('eventsContainer').innerHTML='<div class="empty-state"><div class="icon">📅</div><p>Google 캘린더에 연결하면<br>오늘의 일정을 자동으로 불러옵니다</p></div>';return}tokenClient.requestAccessToken({prompt:'consent'})}

function handleTokenResponse(r){if(r.error){console.error('Token error:',r);return}isAuthed=true;localStorage.setItem('gcal_token',JSON.stringify(gapi.client.getToken()));onAuthed()}
function onAuthed(){document.getElementById('authBtn').textContent='연결 해제';document.getElementById('authBtn').classList.add('signout');document.getElementById('syncStatus').className='sync-status connected';document.getElementById('syncStatus').textContent='✓ Google 캘린더 연동됨';document.getElementById('progressSection').style.display='block';document.getElementById('addEventBtn').classList.add('visible');loadTodayEvents()}

async function loadTodayEvents(){const c=document.getElementById('eventsContainer');c.innerHTML='<div class="spinner"></div>';document.getElementById('syncStatus').className='sync-status loading';document.getElementById('syncStatus').textContent='동기화 중...';try{const t=new Date(),s=new Date(t.getFullYear(),t.getMonth(),t.getDate()),e=new Date(t.getFullYear(),t.getMonth(),t.getDate(),23,59,59);const r=await gapi.client.calendar.events.list({calendarId:'primary',timeMin:s.toISOString(),timeMax:e.toISOString(),singleEvents:true,orderBy:'startTime',timeZone:'Asia/Seoul'});renderEvents(r.result.items||[]);const n=new Date();document.getElementById('syncStatus').className='sync-status connected';document.getElementById('syncStatus').textContent='✓ 동기화 완료 ('+n.getHours()+':'+String(n.getMinutes()).padStart(2,'0')+')'}catch(error){console.error('Error:',error);if(error.status===401){localStorage.removeItem('gcal_token');isAuthed=false;document.getElementById('syncStatus').className='sync-status disconnected';document.getElementById('syncStatus').textContent='인증 만료 - 다시 연결해주세요';document.getElementById('authBtn').textContent='Google 캘린더 연결하기';document.getElementById('authBtn').classList.remove('signout');c.innerHTML='<div class="empty-state"><div class="icon">🔑</div><p>인증이 만료되었습니다.<br>"Google 캘린더 연결하기"를 눌러 다시 연결해주세요.</p></div>';return}c.innerHTML='<div class="empty-state"><div class="icon">⚠️</div><p>일정을 불러오는데 실패했습니다.<br>새로고침 후 다시 시도해주세요.</p><button class="refresh-btn" onclick="loadTodayEvents()" style="margin-top:12px">다시 시도</button></div>';document.getElementById('syncStatus').className='sync-status disconnected';document.getElementById('syncStatus').textContent='동기화 실패'}}

function renderEvents(events){const c=document.getElementById('eventsContainer');if(!events.length){c.innerHTML='<div class="empty-state"><div class="icon">✨</div><p>오늘 예정된 일정이 없습니다.<br>+ 버튼으로 새 일정을 추가해보세요!</p></div>';return}const cs=getCheckState(),now=new Date();let html='',ni=false,total=events.length,checked=0;events.forEach((ev,i)=>{const s=new Date(ev.start.dateTime||ev.start.date),e=new Date(ev.end.dateTime||ev.end.date);if(!ni&&s>now){html+='<div class="now-indicator">현재 시간 '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')+'</div>';ni=true}const st=fmt(s),et=fmt(e),cc=colorMap[ev.colorId]||'default',ic=cs[ev.id]||false;if(ic)checked++;html+='<div class="event-card color-'+cc+(ic?' checked':'')+'" data-event-id="'+ev.id+'" onclick="toggleCheck(\''+ev.id+'\',this)"><div class="event-time">'+st+' - '+et+'</div><div class="event-title">'+(ev.summary||'(제목 없음)')+'</div>'+(ev.description?'<div class="event-desc">'+ev.description.substring(0,60)+'</div>':'')+'<div class="checkbox"></div></div>'});if(!ni)html+='<div class="now-indicator">현재 시간 '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')+'</div>';c.innerHTML=html;updateProgress(checked,total)}
function fmt(d){return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')}

function toggleCheck(id,card){card.classList.toggle('checked');const s=getCheckState();s[id]=card.classList.contains('checked');saveCheckState(s);updateProgress(document.querySelectorAll('.event-card.checked').length,document.querySelectorAll('.event-card').length)}
function updateProgress(c,t){if(!t)return;const p=Math.round(c/t*100);document.getElementById('progressPercent').textContent=p+'%';document.getElementById('progressBar').style.width=p+'%';document.getElementById('progressLabel').textContent='오늘의 진행률 ('+c+'/'+t+')'}
function getCheckState(){const t=new Date().toISOString().split('T')[0];try{return JSON.parse(localStorage.getItem('checklist_'+t))||{}}catch(e){return{}}}
function saveCheckState(s){localStorage.setItem('checklist_'+new Date().toISOString().split('T')[0],JSON.stringify(s))}
function loadCheckState(){const t=new Date();for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('checklist_')){const d=new Date(k.replace('checklist_',''));if((t-d)/(1e3*60*60*24)>7)localStorage.removeItem(k)}}}

function showAddModal(){document.getElementById('modalOverlay').classList.add('active');document.getElementById('newEventTitle').focus()}
function hideAddModal(){document.getElementById('modalOverlay').classList.remove('active')}
async function createEvent(){const title=document.getElementById('newEventTitle').value.trim(),st=document.getElementById('newEventStart').value,et=document.getElementById('newEventEnd').value,desc=document.getElementById('newEventDesc').value.trim();if(!title){alert('일정 이름을 입력해주세요.');return}if(!isAuthed){const today=new Date().toISOString().split('T')[0],s=today.replace(/-/g,'')+'T'+st.replace(':','')+'00',e=today.replace(/-/g,'')+'T'+et.replace(':','')+'00';window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(title)+'&dates='+s+'/'+e+'&details='+encodeURIComponent(desc)+'&ctz=Asia/Seoul','_blank');hideAddModal();return}try{const d=new Date().toISOString().split('T')[0];await gapi.client.calendar.events.insert({calendarId:'primary',resource:{summary:title,description:desc,start:{dateTime:d+'T'+st+':00',timeZone:'Asia/Seoul'},end:{dateTime:d+'T'+et+':00',timeZone:'Asia/Seoul'}}});hideAddModal();document.getElementById('newEventTitle').value='';document.getElementById('newEventDesc').value='';loadTodayEvents()}catch(e){console.error('Error creating event:',e);alert('일정 추가에 실패했습니다.')}}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)hideAddModal()});

window.addEventListener('load',()=>{const check=()=>{if(typeof gapi!=='undefined'&&typeof google!=='undefined'&&google.accounts){gapiLoaded();gisLoaded()}else setTimeout(check,200)};check()});
setInterval(()=>{if(isAuthed)loadTodayEvents()},5*60*1000);
</script>
</body>
</html>
